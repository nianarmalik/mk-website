<svg width="160" height="48" viewBox="0 0 160 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="markGrad" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="52" y1="0" x2="160" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon mark: rounded square -->
  <rect x="0" y="2" width="44" height="44" rx="12" fill="url(#markGrad)"/>
  <!-- Subtle inner highlight -->
  <rect x="0" y="2" width="44" height="44" rx="12" fill="url(#markGrad)" opacity="0.15"/>
  <rect x="1" y="3" width="20" height="8" rx="4" fill="rgba(255,255,255,0.12)"/>

  <!-- mk letters -->
  <!-- m -->
  <path d="M8 32 L8 18 L14 26 L20 18 L20 32" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- k -->
  <path d="M25 18 L25 32" stroke="white" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <path d="M25 25 L36 18" stroke="white" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <path d="M25 25 L36 32" stroke="white" stroke-width="2.8" stroke-linecap="round" fill="none"/>

  <!-- Vibe wave line beneath letters -->
  <path d="M6 37 Q11 34 14 37 Q17 40 20 37 Q23 34 26 37 Q29 40 32 37 Q35 34 38 37"
    stroke="rgba(255,255,255,0.45)" stroke-width="1.4" stroke-linecap="round" fill="none"/>

  <!-- Wordmark: mkvibes -->
  <text x="54" y="33"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="22" font-weight="800" letter-spacing="-0.04em"
    fill="url(#textGrad)">mkvibes</text>
</svg>
